name: CI/CD Pipeline

on:
  # Run validation on every PR, against any target branch
  pull_request:
    branches: ['**']
  # Run on every push to any branch (deploy job is gated below to main/develop)
  push:
    branches: ['**']

jobs:
  # ---------------------------------------------------------------------------
  # validate: runs on every push and PR. Installs deps, generates the Prisma
  # client, lints, and builds. This is the gate the deploy job depends on.
  # ---------------------------------------------------------------------------
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x]
    steps:
      # Pull the repo contents into the runner
      - name: Checkout
        uses: actions/checkout@v4

      # Install Node 22 and enable npm dependency caching
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      # Clean, reproducible install from package-lock.json
      - name: Install dependencies
        run: npm ci

      # Generate the Prisma client so type-aware lint/build can resolve it.
      # (postinstall already runs this, but we run it explicitly to be safe.)
      - name: Generate Prisma client
        run: npx prisma generate

      # ESLint (note: the "lint" script applies --fix locally, but in CI the
      # working tree is discarded, so this only succeeds when code is clean)
      - name: Lint
        run: npm run lint

      # Compile the NestJS app
      - name: Build
        run: npm run build

      # NOTE: `npm test` (jest) is intentionally skipped — the repo currently
      # has no *.spec.ts / e2e tests. Add a "Test" step running `npm test`
      # once real tests exist.

  # ---------------------------------------------------------------------------
  # deploy: depends on validate. Does NOT build code itself — it triggers a
  # Back4App Containers deploy via Back4App's official GitHub Action, which runs
  # the Back4App CLI (b4a) inside a Docker container and redeploys the app
  # identified by `appid`. Gated to pushes (not PRs) on main or develop only.
  # ---------------------------------------------------------------------------
  deploy:
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'develop')
    steps:
      # Resolve which Back4App app to deploy from the branch being pushed.
      # The chosen App ID is written to $GITHUB_ENV so the next step can read it
      # via ${{ env.BACK4APP_APP_ID }}. Secrets are referenced (never hardcoded)
      # and are masked in logs by GitHub Actions.
      - name: Select Back4App App ID by branch
        shell: bash
        run: |
          case "$GITHUB_REF_NAME" in
            main)
              echo "BACK4APP_APP_ID=${{ secrets.BACK4APP_APP_ID_PROD }}" >> "$GITHUB_ENV"
              ;;
            develop)
              echo "BACK4APP_APP_ID=${{ secrets.BACK4APP_APP_ID_DEV }}" >> "$GITHUB_ENV"
              ;;
            *)
              echo "Branch '$GITHUB_REF_NAME' is not deployable; skipping."
              exit 0
              ;;
          esac

      # Fail loudly if the App ID secret for this branch was never configured,
      # so we don't silently call the deploy action with an empty appid.
      - name: Verify Back4App App ID is set
        shell: bash
        run: |
          if [ -z "${BACK4APP_APP_ID:-}" ]; then
            echo "::error::No Back4App App ID configured for branch '$GITHUB_REF_NAME'."
            exit 1
          fi

      # Trigger the Back4App Containers deploy using Back4App's official action.
      # The action (a Docker container action built on back4app/b4a_cli) takes the
      # `appid` input. The Back4App account API key is exposed to the container via
      # the step env so the b4a CLI can authenticate non-interactively — there is
      # no dedicated key input on the action, so env is the only channel into it.
      - name: Deploy to Back4App Containers
        uses: back4app/Github-Ci-Cd-Example@v1
        with:
          appid: ${{ env.BACK4APP_APP_ID }}
        env:
          B4A_ACCOUNT_KEY: ${{ secrets.BACK4APP_API_KEY }}
